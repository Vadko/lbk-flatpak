app-id: com.lbk.launcher
runtime: org.freedesktop.Platform
runtime-version: &runtime-version '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: lbk-launcher

# 32-bit (i386) runtime for Proton/pressure-vessel run via umu
x-gl-version: &gl-version '1.4'
x-gl-versions: &gl-versions 24.08;24.08-extra;1.4
x-gl-merge-dirs: &gl-merge-dirs vulkan/icd.d;glvnd/egl_vendor.d;OpenCL/vendors;lib/dri;lib/d3d;vulkan/explicit_layer.d;vulkan/implicit_layer.d

sdk-extensions:
  - org.freedesktop.Sdk.Compat.i386
  - org.freedesktop.Sdk.Extension.toolchain-i386

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  # umu/Proton pressure-vessel needs to nest bubblewrap inside the sandbox
  - --allow=devel
  - --allow=multiarch
  - --allow=per-app-dev-shm
  - --talk-name=org.freedesktop.portal.Background
  - --env=XDG_DATA_DIRS=/app/share:/usr/lib/extensions/vulkan/share:/usr/share:/usr/share/runtime/share:/run/host/user-share:/run/host/share:/usr/lib/pressure-vessel/overrides/share
  # Gamepad/controller support (udev access for Chromium/Electron)
  - --filesystem=/run/udev:ro
  # Access to Steam directories (for game detection and mod installation)
  # Native Steam
  - --filesystem=~/.steam
  - --filesystem=~/.local/share/Steam
  - --filesystem=~/.local/share/steam
  # System-wide Steam (some distros)
  - --filesystem=/usr/share/steam:ro
  - --filesystem=/usr/local/share/steam:ro
  - --filesystem=/usr/lib/steam:ro
  - --filesystem=/opt/steam:ro
  # Flatpak Steam
  - --filesystem=~/.var/app/com.valvesoftware.Steam
  # Snap Steam
  - --filesystem=~/snap/steam/common
  # Heroic Games Launcher (Epic, GOG, Amazon)
  - --filesystem=~/.config/heroic
  - --filesystem=~/Games/Heroic
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl
  # Legendary (Epic Games CLI)
  - --filesystem=~/.config/legendary
  # GOG Games
  - --filesystem=~/GOG Games
  # Lutris (EA, Ubisoft, etc.)
  - --filesystem=~/.local/share/lutris
  - --filesystem=~/.config/lutris
  - --filesystem=~/Games
  - --filesystem=~/.var/app/net.lutris.Lutris
  # Bottles (EA, Ubisoft, etc.)
  - --filesystem=~/.local/share/bottles
  - --filesystem=~/.var/app/com.usebottles.bottles
  # Access to home for game mods installation
  - --filesystem=home
  # Access to mounted drives (custom Steam libraries, game installs)
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=/run/media
  # Talk to Flatpak Steam if needed
  - --talk-name=org.freedesktop.Flatpak
  # System tray
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications

add-extensions:
  org.freedesktop.Platform.Compat.i386:
    directory: lib/i386-linux-gnu
    version: *runtime-version

  org.freedesktop.Platform.Compat.i386.Debug:
    directory: lib/debug/lib/i386-linux-gnu
    version: *runtime-version
    no-autodownload: true

  org.freedesktop.Platform.GL32:
    directory: lib/i386-linux-gnu/GL
    version: *gl-version
    versions: *gl-versions
    subdirectories: true
    no-autodownload: true
    autodelete: false
    add-ld-path: lib
    merge-dirs: *gl-merge-dirs
    download-if: active-gl-driver
    enable-if: active-gl-driver
    autoprune-unless: active-gl-driver

modules:
  # Create the i386 mount points + ld.so.conf the extensions above need
  - name: platform-bootstrap
    buildsystem: simple
    build-commands:
      - |
        set -e
        mkdir -p /app/lib/i386-linux-gnu/GL
        mkdir -p /app/lib/debug/lib/i386-linux-gnu/GL
        install -Dm644 -t /app/etc ld.so.conf
    sources:
      - type: inline
        dest-filename: ld.so.conf
        contents: |
          include /run/flatpak/ld.so.conf.d/app-*-org.freedesktop.Platform.GL32.*.conf
          /app/lib32
          /app/lib/i386-linux-gnu
          /lib64

  - name: lbk-launcher
    buildsystem: simple
    build-commands:
      # Extract AppImage at build time
      - chmod +x LBK-Launcher-linux.AppImage
      - ./LBK-Launcher-linux.AppImage --appimage-extract
      - mv squashfs-root /app/lbk-launcher
      # Patch desktop filename for correct Wayland app_id
      - patch-desktop-filename /app/lbk-launcher/resources/app.asar com.lbk.launcher
      # Install wrapper script
      - install -Dm755 lbk-launcher.sh /app/bin/lbk-launcher
      # Install desktop and metadata
      - install -Dm644 com.lbk.launcher.desktop /app/share/applications/com.lbk.launcher.desktop
      - install -Dm644 com.lbk.launcher.metainfo.xml /app/share/metainfo/com.lbk.launcher.metainfo.xml
      - install -Dm644 icon-256.png /app/share/icons/hicolor/256x256/apps/com.lbk.launcher.png
      - install -Dm644 icon-128.png /app/share/icons/hicolor/128x128/apps/com.lbk.launcher.png
      - install -Dm644 icon-64.png /app/share/icons/hicolor/64x64/apps/com.lbk.launcher.png
      - install -Dm644 icon-48.png /app/share/icons/hicolor/48x48/apps/com.lbk.launcher.png
      - install -Dm644 icon-32.png /app/share/icons/hicolor/32x32/apps/com.lbk.launcher.png
    sources:
      - type: file
        url: https://github.com/Vadko/lbk-launcher/releases/download/v1.30.0/LBK-Launcher-linux.AppImage
        sha256: 6bc274984c2459c128bd9c626129a22272b2949c18b011e7fa50dc7e775a6de0
        dest-filename: LBK-Launcher-linux.AppImage
      - type: file
        path: lbk-launcher.sh
      - type: file
        path: com.lbk.launcher.desktop
      - type: file
        path: com.lbk.launcher.metainfo.xml
      - type: file
        path: icons/icon-256.png
        dest-filename: icon-256.png
      - type: file
        path: icons/icon-128.png
        dest-filename: icon-128.png
      - type: file
        path: icons/icon-64.png
        dest-filename: icon-64.png
      - type: file
        path: icons/icon-48.png
        dest-filename: icon-48.png
      - type: file
        path: icons/icon-32.png
        dest-filename: icon-32.png
